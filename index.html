<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25计科2班星空留言板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#000000;
min-height:100vh;
overflow:hidden;
position:relative;
}
.bg-title{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:72px;
font-family:"KaiTi","楷体","SimKai","STKaiti",serif;
color:#ffffff;
letter-spacing:8px;
white-space:nowrap;
user-select:none;
z-index:0;
opacity:0.12;
}
.form-box{
position:relative;
z-index:10;
max-width:750px;
margin:30px auto 0;
padding:0 15px;
}
textarea{
width:100%;
background:#050505;
border:1px solid #3366ff;
color:#fff;
padding:12px;
margin:10px 0;
border-radius:6px;
font-size:16px;
}
button{
padding:12px 30px;
background:#2266ff;
border:none;
color:#fff;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
.msg-item{
position:absolute;
font-size:17px;
color:#fff970;
text-shadow:0 0 6px #ffdd22,0 0 12px #ffcc00;
white-space:nowrap;
z-index:5;
}
</style>
</head>
<body>
<div class="bg-title">25计科2班</div>
<div class="form-box">
<form name="starMsg" netlify onsubmit="handleSubmit(event)">
<textarea name="text" rows="3" placeholder="写下留言" required></textarea>
<button type="submit">发送星光留言</button>
</form>
</div>
<script>
let msgList = JSON.parse(localStorage.getItem("starMsgData"))||[];
let msgDom = [];
const speedX = 1.2;
const speedY = 0.8;
function createMoveDom(text){
let div = document.createElement("div");
div.className = "msg-item";
div.innerText = text;
document.body.appendChild(div);
let w = div.offsetWidth;
let h = div.offsetHeight;
let x = Math.random()*(window.innerWidth - w);
let y = Math.random()*(window.innerHeight - h);
let dx = speedX * (Math.random()>0.5?1:-1);
let dy = speedY * (Math.random()>0.5?1:-1);
msgDom.push({el:div,w,h,x,y,dx,dy});
}
function render(){
msgDom.forEach(item=>item.el.remove());
msgDom = [];
msgList.forEach(item=>createMoveDom(item.text));
}
function frame(){
let winW = window.innerWidth;
let winH = window.innerHeight;
msgDom.forEach(item=>{
item.x += item.dx;
item.y += item.dy;
if(item.x <=0 || item.x+item.w >= winW) item.dx *= -1;
if(item.y <=0 || item.y+item.h >= winH) item.dy *= -1;
item.el.style.left = item.x+"px";
item.el.style.top = item.y+"px";
})
requestAnimationFrame(frame);
}
function handleSubmit(e){
e.preventDefault();
const form = e.target;
const text = form.text.value.trim();
msgList.unshift({text});
localStorage.setItem("starMsgData",JSON.stringify(msgList));
fetch("/",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:new URLSearchParams({
"form-name":"starMsg",
text:text
})
}).then(()=>{
form.reset();
render();
alert("星光留言已送出！")
})
}
window.onload = function(){
render();
frame();
}
</script>
</body>
</html>
