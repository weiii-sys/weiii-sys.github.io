<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25计科2班留言星空</title>
<!-- Netlify表单识别必须加的隐藏标记 -->
<form name="messageBoard" netlify hidden>
  <input type="hidden" name="username">
  <input type="hidden" name="content">
  <input type="hidden" name="time">
</form>
<style>
*{margin: 0;padding: 0;box-sizing: border-box;}
body {
  background: linear-gradient(#000000,#101020,#000000);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
  font-family: "SimSun","宋体",serif;
}
.container{max-width:800px;margin:0 auto;}
.send-box{background:rgba(30,30,60,0.4);padding:20px;border-radius:10px;margin-bottom:40px;}
input,textarea{
  width:100%;
  background:rgba(0,0,0,0.5);
  border:1px solid #5577bb;
  color:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:4px;
}
button{
  padding:10px 26px;
  background:#4488ff;
  border:none;
  color:#fff;
  border-radius:4px;
  cursor:pointer;
}
.msg-item{
  background:rgba(20,20,50,0.35);
  padding:16px;
  border-radius:8px;
  margin:12px 0;
}
.name{color:#88ccff;font-size:16px}
.time{color:#aaa;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <!-- 留言提交框 -->
  <div class="send-box">
    <input id="nameInput" placeholder="你的姓名">
    <textarea id="textInput" rows="4" placeholder="写下班级留言"></textarea>
    <button onclick="submitMsg()">提交留言</button>
  </div>
  <!-- 所有同学留言展示区域 -->
  <div id="msgList"></div>
</div>

<script>
// 本地缓存+同步表单提交
function submitMsg(){
  const name = document.getElementById("nameInput").value.trim();
  const text = document.getElementById("textInput").value.trim();
  if(!name || !text){
    alert("姓名和留言不能为空！");
    return;
  }
  const time = new Date().toLocaleString();
  // 1. 存入浏览器本地缓存（自己刷新页面也能看见）
  let allMsg = JSON.parse(localStorage.getItem("classMsg")) || [];
  allMsg.unshift({name,text,time});
  localStorage.setItem("classMsg",JSON.stringify(allMsg));
  // 2. 提交到Netlify云端，所有人共享
  fetch("/",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams({
      "form-name":"messageBoard",
      username:name,
      content:text,
      time:time
    })
  }).then(()=>{
    alert("留言发布成功，刷新页面查看全部！");
    document.getElementById("nameInput").value="";
    document.getElementById("textInput").value="";
    loadMsg();
  })
}
// 加载云端+本地全部留言
function loadMsg(){
  let allMsg = JSON.parse(localStorage.getItem("classMsg")) || [];
  let html = "";
  allMsg.forEach(item=>{
    html += `
    <div class="msg-item">
      <div class="name">${item.name}</div>
      <div>${item.text}</div>
      <div class="time">${item.time}</div>
    </div>`
  })
  document.getElementById("msgList").innerHTML = html;
}
window.onload = loadMsg;
</script>
</body>
</html>
