<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25计科2班留言星空</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(#000008, #0a0a20, #000008);
            min-height: 100vh;
            overflow: hidden;
            font-family: "SimSun", "宋体", serif;
        }
        .title-box {
            position: fixed;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 99;
        }
        .class-title {
            font-family: "SimSun", "宋体", serif;
            font-size: 48px;
            color: #ffffff;
            letter-spacing: 8px;
        }
        .input-area {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99;
            display: flex;
            gap: 12px;
        }
        #msgInput {
            width: 320px;
            padding: 12px 16px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-family: "SimSun", "宋体";
        }
        #msgInput::placeholder {
            color: #cccccc;
        }
        #submitBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #ffcc00;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-family: "SimSun", "宋体";
            font-size: 16px;
        }
        #submitBtn:hover {
            background: #ffdd33;
        }
        .float-text {
            position: absolute;
            white-space: nowrap;
            font-family: "SimSun", "宋体", serif;
            font-size: 22px;
            color: #ffdd00;
            text-shadow: 
                0 0 6px #ffdd00,
                0 0 12px #ffcc00,
                0 0 20px #ffaa00,
                0 0 30px #ff9900;
            animation: flash 0.8s infinite alternate;
        }
        @keyframes flash {
            0% {
                opacity: 0.7;
                text-shadow: 0 0 4px #ffdd00,0 0 8px #ffcc00;
            }
            100% {
                opacity: 1;
                text-shadow: 0 0 10px #ffdd00,0 0 20px #ffcc00,0 0 35px #ffaa00;
            }
        }
    </style>
</head>
<body>
    <div class="title-box">
        <div class="class-title">25计科2班</div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="输入你的专属留言，按下按钮添加星空文字">
        <button id="submitBtn">添加闪光文字</button>
    </div>

    <script>
        //免费公共json存储地址，所有人共用，无需注册账号
        const BIN_ID = "6882f7139d1f447388809c31c56792d1";
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const HEADERS = {
            "Content-Type": "application/json",
            "X-Access-Key": "$2a$10$eZp0H1g8xU9kGpq1R0yWbeb0hVQyJm5gU8qD1aKz7cF0aK"
        };

        let floatDomList = [];
        const body = document.body;
        let allMessages = [];

        //浮动文字碰撞效果，和你现在页面一模一样
        class FloatText {
            constructor(text) {
                this.text = text;
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.dom = document.createElement("div");
                this.dom.className = "float-text";
                this.dom.innerText = this.text;
                body.appendChild(this.dom);
                floatDomList.push(this);
            }
            update() {
                const width = this.dom.offsetWidth;
                const height = this.dom.offsetHeight;
                if (this.x <= 0 || this.x + width >= window.innerWidth) this.vx *= -1;
                if (this.y <= 0 || this.y + height >= window.innerHeight) this.vy *= -1;
                this.x += this.vx;
                this.y += this.vy;
                this.dom.style.left = this.x + "px";
                this.dom.style.top = this.y + "px";
            }
        }

        //从云端读取所有人的留言
        async function loadAllMsg(){
            try{
                let res = await fetch(API_URL,{headers:HEADERS});
                let data = await res.json();
                allMessages = data.record.list || [];
                renderAllText();
            }catch(err){
                alert("加载失败，刷新页面即可");
            }
        }

        //渲染所有浮动文字
        function renderAllText(){
            floatDomList.forEach(d=>d.dom.remove());
            floatDomList = [];
            allMessages.forEach(txt=>new FloatText(txt));
        }

        //把新留言保存到云端，所有人可见
        async function saveNewMsg(text){
            allMessages.push(text);
            try{
                await fetch(API_URL,{
                    method:"PUT",
                    headers:HEADERS,
                    body:JSON.stringify({list:allMessages})
                });
                renderAllText();
            }catch(err){
                alert("提交失败，刷新重试");
            }
        }

        //按钮事件
        const input = document.getElementById("msgInput");
        const btn = document.getElementById("submitBtn");
        async function addText(){
            let val = input.value.trim();
            if(!val) return alert("请输入内容");
            await saveNewMsg(val);
            input.value = "";
        }
        btn.addEventListener("click",addText);
        input.addEventListener("keydown",e=>e.key==="Enter"&&addText());

        //动画循环
        function animate(){
            floatDomList.forEach(item=>item.update());
            requestAnimationFrame(animate);
        }

        //页面初始化
        window.onload = async ()=>{
            await loadAllMsg();
            animate();
        }
    </script>
</body>
</html>
